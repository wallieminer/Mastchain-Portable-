name: Beta Release

on:
  push:
    tags:
      - 'v*-beta'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Set permissions for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: |
        ./gradlew assembleDebug --stacktrace 2>&1 | tee build-output.log
        echo "BUILD_EXIT=$?"

    - name: Upload build log on failure
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build-output.log
        retention-days: 5

    - name: Rename and prepare APK
      run: |
        APK=$(find app/build/outputs/apk -name '*.apk' -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found!"
          find app/build -name '*.apk' -type f 2>/dev/null || true
          exit 1
        fi
        echo "Found APK: $APK"
        cp "$APK" mastchain-portable.apk
        ls -la mastchain-portable.apk

    - name: Get version info
      id: version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        SHORT_SHA=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y-%m-%d')
        echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "date=${DATE}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: MastChain Portable ${{ steps.version.outputs.tag }} 🚢
        prereise: true
        body: |
          ## 🚢 MastChain Portable ${{ steps.version.outputs.tag }}

          **Beta Release** — Built on ${{ steps.version.outputs.date }} from commit `${{ steps.version.outputs.sha }}`

          ### ✨ What's New
          - 📍 GPS + H3 Hex — FusedLocation provider with H3 hex (resolution 5)
          - 🔙 Back Navigation Fix — MastChain tab back stack works properly
          - 🧹 MastChain-only Cleanup — Removed Airspy, HackRF, SpyServer from Java/UI
          - 📊 MastChain Dashboard V2 — Real data, MastChain theme

          ### 📲 How to Install
          1. Download mastchain-portable.apk below
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          4. Connect an RTL-SDR dongle via USB OTG
          5. Start tracking ships! 🚢

          ---
          *Built on a Nintendo Switch (SwitchClaw) and Steam Deck (SteamClaw)*
        files: |
          mastchain-portable.apk