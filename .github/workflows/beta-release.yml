name: Beta Release

on:
  push:
    tags:
      - 'v*-beta'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Ninja
      run: sudo apt-get update && sudo apt-get install -y ninja-build

    - name: Install NDK 24.0.8215888
      run: |
        echo "Installing NDK 24.0.8215888..."
        "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;24.0.8215888" || \
        "$ANDROID_HOME/tools/bin/sdkmanager" "ndk;24.0.8215888" || \
        echo "Trying default NDK..."
        ls -la "$ANDROID_HOME/ndk/" 2>/dev/null || true

    - name: Set permissions for gradlew
      run: chmod +x gradlew

    - name: Debug info
      run: |
        echo "=== NDK ==="
        ls -la /usr/local/lib/android/sdk/ndk/ 2>/dev/null || echo "No NDK in /usr/local"
        echo "$ANDROID_HOME"
        echo "$ANDROID_SDK_ROOT"
        ls -la $ANDROID_HOME/ndk/ 2>/dev/null || echo "No NDK"
        echo "=== CMake ==="
        which cmake && cmake --version
        which ninja && ninja --version
        echo "=== Submodules ==="
        git submodule status
        echo "=== jni contents ==="
        ls -la app/src/main/jni/

    - name: Build Debug APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Find and rename APK
      run: |
        echo "=== Full APK tree ==="
        find app/build/outputs -name '*.apk' -type f || echo "find returned nothing"
        echo "=== Checking debug dir ==="
        ls -la app/build/outputs/apk/debug/ 2>/dev/null || echo "No debug dir"
        ls -la app/build/outputs/apk/ 2>/dev/null || echo "No apk dir"
        APK=$(find app/build/outputs -name '*.apk' -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found anywhere in app/build/outputs!"
          echo "=== Full build outputs ==="
          find app/build/outputs -type f 2>/dev/null | head -50
          exit 1
        fi
        echo "Found APK: $APK"
        mkdir -p app/build/outputs/apk/debug
        cp "$APK" app/build/outputs/apk/debug/mastchain-portable.apk
        ls -la app/build/outputs/apk/debug/mastchain-portable.apk

    - name: Get version info
      id: version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        SHORT_SHA=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y-%m-%d')
        echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "date=${DATE}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: MastChain Portable ${{ steps.version.outputs.tag }} 🚢
        prerelease: true
        body: |
          ## 🚢 MastChain Portable ${{ steps.version.outputs.tag }}

          **Beta Release** — Built on ${{ steps.version.outputs.date }} from commit `${{ steps.version.outputs.sha }}`

          ### ✨ What's New
          - 🔧 **MastChain HTTP Upload** — Send AIS data directly to the MastChain network
          - 📊 **MastChain Dashboard Panel** — View station status, messages sent, and community ships
          - 🐛 **SSL Certificate Fix** — Works on GrapheneOS/Vanadium (onReceivedSslError bypass)
          - 🌐 **Mixed Content Fix** — MIXED_CONTENT_ALWAYS_ALLOW for MastChain API
          - ⚙️ **MastChain Feed Settings** — URL, User, Password, Protocol, Interval configuration
          - 🆔 **Station ID Support** — Identify your station on the MastChain network
          - 🤝 **Community Share Toggle** — Share your AIS data with other MastChain stations

          ### 📲 How to Install
          1. Download `mastchain-portable.apk` below
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          4. Connect an RTL-SDR dongle via USB OTG
          5. Go to **Settings → MastChain Feed** and enter your credentials
          6. Start tracking ships and earning MAST tokens! 🚢

          ### ⚠️ Beta Notice
          This is a **beta release**. Expect bugs. Please report issues at [GitHub Issues](https://github.com/wallieminer/Mastchain-Portable-/issues).

          ### 🙏 Credits
          - Based on [AIS-catcher](https://github.com/jvde-github/AIS-catcher-for-Android) by jvde-github
          - MastChain integration by [WallieMiner](https://github.com/wallieminer)
          - Built with ❤️ and 10 versions of trial-and-error

          ---
          *Built on a Nintendo Switch (SwitchClaw) and Steam Deck (SteamClaw)*
        files: |
          app/build/outputs/apk/debug/mastchain-portable.apk