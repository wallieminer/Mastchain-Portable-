name: Beta Release

on:
  push:
    tags:
      - 'v*-beta'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository and submodules
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install build dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y ninja-build
        "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "ndk;24.0.8215888" || true
        ls -la "$ANDROID_HOME/ndk/" 2>/dev/null || true

    - name: Set permissions for gradlew
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Find APK
      id: apk
      run: |
        echo "=== Looking for APK ==="
        find app/build/outputs -name '*.apk' -type f 2>/dev/null || true
        APK=$(find app/build/outputs -name '*.apk' -type f | head -1)
        if [ -z "$APK" ]; then
          echo "ERROR: No APK found!"
          find app/build/outputs -type f 2>/dev/null | head -50
          exit 1
        fi
        echo "Found APK: $APK"
        cp "$APK" mastchain-portable.apk
        echo "path=mastchain-portable.apk" >> $GITHUB_OUTPUT

    - name: Get version info
      id: version
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        SHORT_SHA=$(git rev-parse --short HEAD)
        DATE=$(date +'%Y-%m-%d')
        echo "tag=${TAG_NAME}" >> $GITHUB_OUTPUT
        echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
        echo "date=${DATE}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.version.outputs.tag }}
        name: MastChain Portable ${{ steps.version.outputs.tag }} 🚢
        prerelease: true
        body: |
          ## 🚢 MastChain Portable ${{ steps.version.outputs.tag }}

          **Beta Release** — Built on ${{ steps.version.outputs.date }} from commit `${{ steps.version.outputs.sha }}`

          ### ✨ What's New
          - 📍 **GPS + H3 Hex** — FusedLocation provider with H3 hex (resolution 5)
          - 🔙 **Back Navigation Fix** — MastChain tab back stack works properly
          - 🧹 **MastChain-only Cleanup** — Removed Airspy, HackRF, SpyServer
          - 📊 **MastChain Dashboard V2** — Real data, MastChain theme
          - 🔧 **Renamed APK** to mastchain-portable.apk

          ### 📲 How to Install
          1. Download `mastchain-portable.apk` below
          2. Enable "Install from unknown sources" on your Android device
          3. Install the APK
          4. Connect an RTL-SDR dongle via USB OTG
          5. Go to **Settings → MastChain Feed** and enter your credentials
          6. Start tracking ships! 🚢

          ### ⚠️ Beta Notice
          This is a **beta release**. Report issues at [GitHub Issues](https://github.com/wallieminer/Mastchain-Portable-/issues).

          ---
          *Built on a Nintendo Switch (SwitchClaw) and Steam Deck (SteamClaw)*
        files: |
          mastchain-portable.apk